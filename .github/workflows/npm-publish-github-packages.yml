name: Node.js CI/CD

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install
      - run: npm test || true

  deploy-to-hf:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Hugging Face Spaces
        uses: huggingface/actions-upload@main
        with:
          token: ${{ secrets.HF_TOKEN }}
          space: ahmad-nisar/student-management-system